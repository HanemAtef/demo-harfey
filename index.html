
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f9fa;color:#191c1d}
.app{display:flex;height:100vh;overflow:hidden;min-height:600px}
.sidebar{width:220px;background:#0F4C75;color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:18px 16px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;gap:8px}
.sidebar-logo .badge{background:#FC9024;color:#fff;font-size:10px;padding:2px 6px;border-radius:99px}
.role-switcher{padding:10px 12px;background:rgba(255,255,255,0.08);margin:10px 10px 4px;border-radius:8px;font-size:12px}
.role-switcher select{background:transparent;border:none;color:#fff;font-size:12px;width:100%;outline:none;font-family:inherit;cursor:pointer}
.role-switcher select option{background:#0F4C75;color:#fff}
.nav-section{padding:6px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.8);transition:background 0.15s}
.nav-item:hover{background:rgba(255,255,255,0.1)}
.nav-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600;border-left:3px solid #FC9024}
.nav-item .icon{font-size:16px;width:18px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #e1e8eb;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(15,76,117,0.06)}
.topbar-title{font-size:15px;font-weight:700;color:#0F4C75}
.topbar-actions{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:#0F4C75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:50%;color:#555;font-size:16px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:#f0f0f0}
.content{flex:1;overflow-y:auto;padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:16px;border:0.5px solid #e1e8eb;box-shadow:0 2px 8px rgba(15,76,117,0.06)}
.stat-label{font-size:11px;color:#72787f;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.stat-value{font-size:24px;font-weight:700;color:#0F4C75}
.stat-sub{font-size:11px;color:#28A745;margin-top:2px}
.section-title{font-size:16px;font-weight:700;color:#0F4C75;margin-bottom:12px}
.card{background:#fff;border-radius:12px;padding:16px;border:0.5px solid #e1e8eb;box-shadow:0 2px 8px rgba(15,76,117,0.06);margin-bottom:16px}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:10px 12px;background:#f3f4f5;color:#41474e;font-weight:600;border-bottom:1px solid #e1e8eb}
.table td{padding:10px 12px;border-bottom:0.5px solid #f0f0f0;color:#191c1d;vertical-align:middle}
.table tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700}
.badge-green{background:#e8f5e9;color:#1b7a2d}
.badge-blue{background:#e3f0fb;color:#0F4C75}
.badge-orange{background:#fff3e0;color:#914d00}
.badge-red{background:#fdecea;color:#ba1a1a}
.badge-gray{background:#f0f0f0;color:#555}
.badge-purple{background:#f3e8ff;color:#6a0dad}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity 0.15s}
.btn:hover{opacity:0.88}
.btn-primary{background:#0F4C75;color:#fff}
.btn-orange{background:#FC9024;color:#fff}
.btn-outline{background:transparent;border:1px solid #0F4C75;color:#0F4C75}
.btn-danger{background:#ba1a1a;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.handyman-card{background:#fff;border-radius:12px;border:0.5px solid #e1e8eb;padding:16px;display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;box-shadow:0 2px 8px rgba(15,76,117,0.06);cursor:pointer;transition:border-color 0.15s}
.handyman-card:hover{border-color:#0F4C75}
.hm-avatar{width:52px;height:52px;border-radius:50%;background:#0F4C75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.hm-info{flex:1}
.hm-name{font-size:15px;font-weight:700;color:#0F4C75}
.hm-prof{font-size:12px;color:#72787f;margin-top:1px}
.hm-stats{display:flex;gap:12px;margin-top:6px}
.hm-stat{font-size:12px;color:#41474e;display:flex;align-items:center;gap:3px}
.star{color:#FC9024}
.verified{color:#28A745;font-size:11px;display:inline-flex;align-items:center;gap:3px}
.order-card{background:#fff;border-radius:12px;border:0.5px solid #e1e8eb;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(15,76,117,0.06)}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-id{font-size:12px;color:#72787f}
.order-prof{font-size:14px;font-weight:700;color:#0F4C75}
.order-detail{font-size:12px;color:#41474e;margin-top:4px}
.order-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:0.5px solid #f0f0f0}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:#e1e8eb}
.tl-item{position:relative;padding-bottom:16px;padding-left:20px}
.tl-dot{position:absolute;left:-9px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid #0F4C75;background:#fff}
.tl-dot.done{background:#0F4C75}
.tl-dot.active{background:#FC9024;border-color:#FC9024;box-shadow:0 0 0 3px rgba(252,144,36,0.2)}
.tl-text{font-size:13px;color:#191c1d}
.tl-time{font-size:11px;color:#72787f;margin-top:1px}
.map-placeholder{background:linear-gradient(135deg,#e3f0fb,#cde7c0);border-radius:12px;height:140px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#0F4C75;font-weight:600;margin-bottom:12px;border:1px solid #c1d8e8;position:relative;overflow:hidden}
.map-pin{position:absolute;font-size:24px;top:50%;left:50%;transform:translate(-50%,-60%)}
.chat-msg{display:flex;gap:8px;margin-bottom:10px}
.chat-msg.me{flex-direction:row-reverse}
.chat-bubble{padding:8px 12px;border-radius:12px;font-size:13px;max-width:65%}
.chat-bubble.other{background:#e1e8eb;color:#191c1d;border-radius:12px 12px 12px 0}
.chat-bubble.me{background:#0F4C75;color:#fff;border-radius:12px 12px 0 12px}
.chat-time{font-size:10px;color:#72787f;align-self:flex-end}
.chat-input-row{display:flex;gap:8px;margin-top:12px;border-top:1px solid #f0f0f0;padding-top:12px}
.chat-input{flex:1;border:1px solid #e1e8eb;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none}
.chat-input:focus{border-color:#0F4C75}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:#41474e;margin-bottom:4px;display:block}
.form-input{width:100%;border:1px solid #e1e8eb;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;background:#fff}
.form-input:focus{border-color:#0F4C75}
.form-select{width:100%;border:1px solid #e1e8eb;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;background:#fff;cursor:pointer}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.page-title{font-size:20px;font-weight:700;color:#0F4C75}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.notify-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid #f0f0f0}
.notify-icon{width:36px;height:36px;border-radius:50%;background:#e3f0fb;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.notify-text{font-size:13px;color:#191c1d;line-height:1.4}
.notify-time{font-size:11px;color:#72787f;margin-top:2px}
.progress-bar{height:6px;background:#e1e8eb;border-radius:99px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:#0F4C75;border-radius:99px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:22px;transition:0.2s}
.toggle input:checked+.toggle-slider{background:#28A745}
.toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.avail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #f0f0f0}
.earnings-big{font-size:32px;font-weight:700;color:#0F4C75;margin:4px 0}
.earnings-sub{font-size:13px;color:#72787f}
.profession-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.prof-chip{padding:6px 14px;border-radius:99px;background:#e3f0fb;color:#0F4C75;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s}
.prof-chip.active{background:#0F4C75;color:#fff}
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:8px}
.mini-bar{background:#0F4C75;border-radius:3px 3px 0 0;flex:1;opacity:0.7;transition:opacity 0.15s}
.mini-bar:hover{opacity:1}
.action-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
</style>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">⚒️ Harfey <span class="badge">DEMO</span></div>
    <div class="role-switcher">
      <div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:3px">View as:</div>
      <select id="roleSelect" onchange="switchRole(this.value)">
        <option value="customer">👤 Customer — Ahmed</option>
        <option value="handyman">🔧 Handyman — Sami</option>
        <option value="admin">🛡️ Admin</option>
      </select>
    </div>
    <div class="nav-section" id="navItems"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">Home</span>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="navigate('notifications')">🔔</button>
        <button class="icon-btn" onclick="navigate('chat')">💬</button>
        <div class="avatar" id="userAvatar">AM</div>
      </div>
    </div>
    <div class="content" id="contentArea"></div>
  </div>
</div>

<script>
const state={role:'customer',page:'home',ratingVal:0};

const roles={
  customer:{avatar:'AM',nav:[
    {id:'home',icon:'🏠',label:'Home'},
    {id:'explore',icon:'🔍',label:'Explore Handymen'},
    {id:'orders',icon:'📋',label:'My Bookings'},
    {id:'track',icon:'📍',label:'Track Order'},
    {id:'chat',icon:'💬',label:'Messages'},
    {id:'review',icon:'⭐',label:'Rate Service'},
    {id:'profile',icon:'👤',label:'Profile'},
    {id:'notifications',icon:'🔔',label:'Notifications'},
  ]},
  handyman:{avatar:'SI',nav:[
    {id:'hm-dashboard',icon:'📊',label:'Dashboard'},
    {id:'hm-orders',icon:'📋',label:'Job Requests'},
    {id:'hm-earnings',icon:'💰',label:'Earnings'},
    {id:'chat',icon:'💬',label:'Messages'},
    {id:'hm-profile',icon:'👤',label:'My Profile'},
    {id:'notifications',icon:'🔔',label:'Notifications'},
  ]},
  admin:{avatar:'AD',nav:[
    {id:'admin-dashboard',icon:'📊',label:'Overview'},
    {id:'admin-users',icon:'👥',label:'User Management'},
    {id:'admin-orders',icon:'📋',label:'Orders'},
    {id:'admin-verify',icon:'✅',label:'Auto-Verification'},
    {id:'notifications',icon:'🔔',label:'Notifications'},
  ]}
};

function switchRole(r){
  state.role=r;
  document.getElementById('userAvatar').textContent=roles[r].avatar;
  buildNav();
  navigate(roles[r].nav[0].id);
}

function buildNav(){
  document.getElementById('navItems').innerHTML=roles[state.role].nav.map(n=>
    `<div class="nav-item ${state.page===n.id?'active':''}" onclick="navigate('${n.id}')">
      <span class="icon">${n.icon}</span>${n.label}</div>`
  ).join('');
}

function navigate(page){
  state.page=page;
  buildNav();
  const titles={
    home:'Home',explore:'Explore Handymen',orders:'My Bookings',
    track:'Track Order',chat:'Messages',review:'Rate Service',
    profile:'My Profile',notifications:'Notifications',
    'hm-dashboard':'Handyman Dashboard','hm-orders':'Job Requests',
    'hm-earnings':'Earnings & Stats','hm-profile':'My Profile',
    'admin-dashboard':'Platform Overview','admin-users':'User Management',
    'admin-orders':'Order Management','admin-verify':'Auto-Verification'
  };
  document.getElementById('topbarTitle').textContent=titles[page]||page;
  document.getElementById('contentArea').innerHTML=pages[page]?pages[page]():'<p>Page not found</p>';
}

const handymen=[
  {id:1,name:'Sami Ibrahim',prof:'Carpenter',rating:4.9,jobs:87,exp:8,price:150,available:true,verified:true,initials:'SI',bio:'Specialist in woodwork and modern furniture'},
  {id:2,name:'Mohamed Ali',prof:'Electrician',rating:4.7,jobs:124,exp:12,price:120,available:true,verified:true,initials:'MA',bio:'12 years in residential and commercial electrical work'},
  {id:3,name:'Khaled Hassan',prof:'Plumber',rating:4.8,jobs:56,exp:6,price:100,available:false,verified:true,initials:'KH',bio:'Plumbing & sanitary work, available for emergencies'},
  {id:4,name:'Omar Farouk',prof:'Painter',rating:4.5,jobs:43,exp:5,price:80,available:true,verified:false,initials:'OF',bio:'Interior decor and decorative painting'},
];

const orders=[
  {id:'#ORD-001',prof:'Carpentry',customer:'Ahmed Mansour',handyman:'Sami Ibrahim',status:'in-progress',price:350,date:'2025-06-25',type:'instant',desc:'Fix wooden door and install a wardrobe'},
  {id:'#ORD-002',prof:'Electrical',customer:'Fatma Ahmed',handyman:'Mohamed Ali',status:'completed',price:220,date:'2025-06-20',type:'scheduled',desc:'Install hall lighting and rewiring'},
  {id:'#ORD-003',prof:'Plumbing',customer:'Ahmed Mansour',handyman:'Khaled Hassan',status:'pending',price:180,date:'2025-06-27',type:'instant',desc:'Fix bathroom water leak'},
  {id:'#ORD-004',prof:'Painting',customer:'Nour Salem',handyman:'Omar Farouk',status:'cancelled',price:0,date:'2025-06-18',type:'scheduled',desc:'Paint 3-bedroom apartment'},
  {id:'#ORD-005',prof:'Electrical',customer:'Ahmed Mansour',handyman:'Mohamed Ali',status:'completed',price:300,date:'2025-06-10',type:'instant',desc:'Replace old electrical panel'},
];

const statusLabels={pending:'Pending',accepted:'Accepted','in-progress':'In Progress',completed:'Completed',cancelled:'Cancelled',price_confirmed:'Price Confirmed'};
const statusClasses={pending:'badge-orange','in-progress':'badge-blue',completed:'badge-green',cancelled:'badge-red',accepted:'badge-purple',price_confirmed:'badge-green'};

function statusBadge(s){return `<span class="badge ${statusClasses[s]||'badge-gray'}">${statusLabels[s]||s}</span>`}

const pages={
  home:()=>`
    <div class="page-header">
      <div>
        <div class="page-title">Welcome back, Ahmed 👋</div>
        <div style="font-size:13px;color:#72787f;margin-top:2px">Cairo, Egypt · ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
      </div>
      <button class="btn btn-orange" onclick="navigate('explore')">🔍 Find a Handyman</button>
    </div>
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value">12</div><div class="stat-sub">+2 this month</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">9</div><div class="stat-sub">75% completion rate</div></div>
      <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value">EGP 2,450</div><div class="stat-sub">avg EGP 272 / order</div></div>
    </div>
    <div class="two-col">
      <div>
        <div class="section-title">Recent Orders</div>
        ${orders.slice(0,2).map(o=>`
          <div class="order-card">
            <div class="order-header"><span class="order-prof">${o.prof}</span>${statusBadge(o.status)}</div>
            <div class="order-detail">${o.handyman} · ${o.desc.substring(0,35)}...</div>
            <div class="order-footer"><span style="font-size:12px;color:#72787f">${o.date}</span><span style="font-size:13px;font-weight:700;color:#0F4C75">EGP ${o.price}</span></div>
          </div>`).join('')}
        <button class="btn btn-outline btn-sm" onclick="navigate('orders')" style="width:100%;justify-content:center">View all bookings</button>
      </div>
      <div>
        <div class="section-title">Top Handymen</div>
        ${handymen.slice(0,2).map(h=>`
          <div class="handyman-card" onclick="navigate('explore')">
            <div class="hm-avatar">${h.initials}</div>
            <div class="hm-info">
              <div class="hm-name">${h.name} ${h.verified?'<span class="verified">✓ Verified</span>':''}</div>
              <div class="hm-prof">${h.prof}</div>
              <div class="hm-stats">
                <span class="hm-stat"><span class="star">★</span>${h.rating}</span>
                <span class="hm-stat">💼 ${h.jobs} jobs</span>
                <span class="hm-stat" style="color:${h.available?'#28A745':'#72787f'}">${h.available?'● Available':'○ Busy'}</span>
              </div>
            </div>
            <div style="font-size:14px;font-weight:700;color:#FC9024">EGP ${h.price}</div>
          </div>`).join('')}
      </div>
    </div>`,

  explore:()=>{
    const profs=['All','Carpenter','Electrician','Plumber','Painter','Mechanic','Tinsmith'];
    return `
      <div class="page-header"><div class="page-title">Explore Handymen</div></div>
      <div style="margin-bottom:14px">
        <input class="form-input" placeholder="🔍 Search by name or profession..." style="max-width:360px">
      </div>
      <div class="profession-chips">
        ${profs.map((p,i)=>`<div class="prof-chip ${i===0?'active':''}" onclick="filterProf(this)">${p}</div>`).join('')}
      </div>
      ${handymen.map(h=>`
        <div class="handyman-card">
          <div class="hm-avatar">${h.initials}</div>
          <div class="hm-info">
            <div class="hm-name">${h.name} ${h.verified?'<span class="verified">✓ Verified</span>':''}</div>
            <div class="hm-prof">${h.prof} · ${h.exp} yrs experience</div>
            <div style="font-size:12px;color:#41474e;margin-top:4px">${h.bio}</div>
            <div class="hm-stats">
              <span class="hm-stat"><span class="star">★</span>${h.rating}</span>
              <span class="hm-stat">💼 ${h.jobs} jobs</span>
              <span class="hm-stat" style="color:${h.available?'#28A745':'#72787f'}">${h.available?'● Available':'○ Busy'}</span>
            </div>
          </div>
          <div style="text-align:center">
            <div style="font-size:18px;font-weight:700;color:#FC9024">EGP ${h.price}<span style="font-size:11px;font-weight:400;color:#72787f">/hr</span></div>
            <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="bookHandyman()">Book Now</button>
          </div>
        </div>`).join('')}`;
  },

  orders:()=>`
    <div class="page-header">
      <div class="page-title">My Bookings</div>
      <button class="btn btn-orange" onclick="navigate('explore')">+ New Booking</button>
    </div>
    <div class="card" style="padding:10px 16px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:#72787f">Filter:</span>
      <span class="badge badge-blue" style="cursor:pointer">All (${orders.length})</span>
      <span class="badge badge-orange" style="cursor:pointer">Pending (${orders.filter(o=>o.status==='pending').length})</span>
      <span class="badge badge-blue" style="cursor:pointer">In Progress (${orders.filter(o=>o.status==='in-progress').length})</span>
      <span class="badge badge-green" style="cursor:pointer">Completed (${orders.filter(o=>o.status==='completed').length})</span>
      <span class="badge badge-red" style="cursor:pointer">Cancelled (${orders.filter(o=>o.status==='cancelled').length})</span>
    </div>
    ${orders.map(o=>`
      <div class="order-card">
        <div class="order-header">
          <div><span class="order-prof">${o.prof}</span><span class="order-id" style="margin-left:8px">${o.id}</span></div>
          <div style="display:flex;gap:6px;align-items:center">
            ${o.type==='instant'?'<span class="badge badge-orange">⚡ Instant</span>':'<span class="badge badge-blue">📅 Scheduled</span>'}
            ${statusBadge(o.status)}
          </div>
        </div>
        <div class="order-detail">🔧 ${o.handyman}</div>
        <div class="order-detail" style="margin-top:2px">📝 ${o.desc}</div>
        <div class="order-footer">
          <span style="font-size:12px;color:#72787f">📅 ${o.date}</span>
          <div style="display:flex;gap:8px;align-items:center">
            ${o.price?`<span style="font-size:14px;font-weight:700;color:#0F4C75">EGP ${o.price}</span>`:'<span style="font-size:12px;color:#72787f">Price TBD</span>'}

function filterProf(el){
  document.querySelectorAll('.prof-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function bookHandyman(){
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999';
  modal.innerHTML=`<div style="background:#fff;border-radius:16px;padding:24px;width:360px;max-width:90%">
    <div style="font-size:17px;font-weight:700;color:#0F4C75;margin-bottom:16px">📋 New Service Request</div>
    <div class="form-group"><label class="form-label">Describe the problem</label><textarea class="form-input" rows="2" placeholder="Describe what needs to be fixed..." style="resize:none"></textarea></div>
    <div class="form-group"><label class="form-label">Request type</label>
      <select class="form-select"><option>⚡ Instant</option><option>📅 Scheduled</option></select>
    </div>
    <div class="form-group"><label class="form-label">Emergency?</label>
      <select class="form-select"><option>No — 10% commission</option><option>Yes — 15% commission</option></select>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-orange" style="flex:1;justify-content:center" onclick="confirmBook()">Confirm Request</button>
      <button class="btn btn-outline" onclick="this.closest('[style*=fixed]').remove()">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function confirmBook(){
  document.querySelector('[style*=fixed]')?.remove();
  alert('✅ Request sent! The handyman will contact you within minutes.');
  navigate('orders');
}

function setRating(val){
  state.ratingVal=val;
  const stars=document.querySelectorAll('#ratingStars span');
  stars.forEach((s,i)=>s.style.color=i<val?'#FC9024':'#e1e8eb');
  const labels=['','Poor','Fair','Good','Very Good','Excellent! 🎉'];
  const lbl=document.getElementById('ratingLabel');
  if(lbl) lbl.textContent=labels[val];
}

function sendMsg(e){
  if(e.key!=='Enter') return;
  const input=document.getElementById('chatInput');
  if(!input||!input.value.trim()) return;
  const area=document.getElementById('chatMessages');
  if(!area) return;
  const div=document.createElement('div');
  div.className='chat-msg me';
  div.innerHTML=`<div class="chat-bubble me">${input.value}</div><div class="chat-time">${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>`;
  area.appendChild(div);
  input.value='';
  area.scrollTop=area.scrollHeight;
}

function submitReview(){
  if(!state.ratingVal){alert('Please select a rating first');return;}
  alert(`✅ Thank you! Your ${state.ratingVal}-star rating has been submitted.`);
  state.ratingVal=0;
  navigate('orders');
}

switchRole('customer');
</script>
